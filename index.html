<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>演示系统 - 首页</title>
    <link rel="stylesheet" href="./assets/css/styles.css" />
  </head>
  <body class="home-page">
    <div class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Yanshi Demo</p>
          <h1>演示系统首页</h1>
        </div>
        <div class="topbar-actions">
          <div id="user-meta" class="user-meta"></div>
          <button id="logout-button" class="secondary-button" type="button">退出登录</button>
        </div>
      </header>

      <main class="dashboard">
        <section class="welcome-panel">
          <p class="eyebrow">Welcome</p>
          <h2 id="welcome-text">正在加载首页信息...</h2>
          <p class="hero-text">这里是当前项目的首页演示区域，可继续扩展业务模块、看板或快捷入口。</p>
        </section>

        <section class="card-grid">
          <article class="info-card">
            <h3>当前用户</h3>
            <p id="user-name">--</p>
          </article>
          <article class="info-card">
            <h3>当前角色</h3>
            <p id="user-role">--</p>
          </article>
          <article class="info-card">
            <h3>系统状态</h3>
            <p>本地运行中</p>
          </article>
        </section>

        <section class="actions-panel">
          <div class="panel-heading">
            <h3>快捷操作</h3>
            <button id="refresh-button" class="secondary-button" type="button">刷新数据</button>
          </div>
          <ul id="action-list" class="action-list"></ul>
        </section>
      </main>
    </div>
    <script src="./assets/js/common.js"></script>
    <script src="./assets/js/index.js"></script>
  </body>
</html>
