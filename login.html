<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>演示系统 - 登录</title>
    <link rel="stylesheet" href="./assets/css/styles.css" />
  </head>
  <body class="auth-page">
    <main class="auth-layout">
      <section class="auth-hero">
        <p class="eyebrow">Yanshi Demo</p>
        <h1>演示系统</h1>
        <p class="hero-text">一个用于本地演示的 PC 网页，包含登录页与首页完整闭环。</p>
        <div class="hero-card">
          <p>默认账号：<strong>admin</strong></p>
          <p>默认密码：<strong>admin123</strong></p>
        </div>
      </section>

      <section class="auth-panel">
        <form id="login-form" class="auth-form">
          <h2>登录</h2>
          <label class="field">
            <span>账号</span>
            <input id="username" name="username" type="text" placeholder="请输入账号" autocomplete="username" />
          </label>
          <label class="field">
            <span>密码</span>
            <input id="password" name="password" type="password" placeholder="请输入密码" autocomplete="current-password" />
          </label>
          <p id="form-message" class="form-message" aria-live="polite"></p>
          <button id="submit-button" class="primary-button" type="submit">登录</button>
        </form>
      </section>
    </main>
    <script src="./assets/js/common.js"></script>
    <script src="./assets/js/login.js"></script>
  </body>
</html>
