<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>演示系统 - 登录</title>
    <link rel="stylesheet" href="./assets/css/styles.css" />
  </head>
  <body class="auth-page">
    <main class="auth-stage">
      <section class="auth-showcase">
        <div class="brand-mark">
          <img src="./assets/images/icons/transparent/logo.png" alt="演示系统标识" />
          <div>
            <p class="eyebrow">Yanshi Demo</p>
            <h1>演示系统</h1>
            <p class="showcase-subtitle">本地演示登录入口</p>
          </div>
        </div>

        <div class="auth-default-card">
          <img src="./assets/images/icons/transparent/shield.png" alt="" />
          <div>
            <span>默认账号</span>
            <strong>admin / admin123</strong>
          </div>
        </div>
      </section>

      <section class="auth-panel">
        <form id="login-form" class="auth-form">
          <div class="auth-form-header">
            <p class="eyebrow">Secure Access</p>
            <h2>登录</h2>
          </div>

          <label class="field">
            <span>账号</span>
            <span class="field-shell">
              <img class="field-icon" src="./assets/images/icons/transparent/account.png" alt="" />
              <input id="username" name="username" type="text" placeholder="请输入账号" autocomplete="username" />
            </span>
          </label>

          <label class="field">
            <span>密码</span>
            <span class="field-shell">
              <img class="field-icon" src="./assets/images/icons/transparent/lock.png" alt="" />
              <input id="password" name="password" type="password" placeholder="请输入密码" autocomplete="current-password" />
            </span>
          </label>

          <p id="form-message" class="form-message" aria-live="polite"></p>
          <button id="submit-button" class="primary-button auth-submit" type="submit">登录</button>
        </form>
      </section>
    </main>
    <script src="./assets/js/common.js"></script>
    <script src="./assets/js/login.js"></script>
  </body>
</html>
